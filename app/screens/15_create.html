<div class="app">
  <div class="topbar"><span style="font-size:14px;color:var(--ink-muted)">Cancel</span><span class="title">New post</span><button class="btn btn-primary btn-sm">post</button></div>
  <div class="scroll" style="padding-top:16px">
    <div style="display:flex;align-items:center;gap:11px;margin-bottom:16px">
      <div class="mono s t5">m</div>
      <div class="chip on" style="cursor:pointer">posting to: trail running <i class="ph ph-caret-down"></i></div>
    </div>
    <div style="font-size:17px;line-height:1.5;color:var(--ink)">anyone want to swap routes for next weekend? looking for something with more climbing —</div>
    <div style="font-size:17px;line-height:1.5;color:var(--ink-soft)">keep typing…</div>
  </div>
  <div style="position:absolute;left:0;right:0;bottom:0;padding:14px 18px 22px;border-top:1px solid var(--line);background:var(--bg);display:flex;align-items:center;gap:6px">
    <button class="icon-btn"><i class="ph ph-image"></i></button>
    <button class="icon-btn"><i class="ph ph-map-pin"></i></button>
    <button class="icon-btn"><i class="ph ph-calendar-blank"></i></button>
    <button class="icon-btn"><i class="ph ph-hash"></i></button>
    <span style="margin-left:auto;font-size:12px;color:var(--ink-soft)">280</span>
  </div>
</div>
